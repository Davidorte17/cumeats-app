<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurantes disponibles - CUMEats</title>
    <link rel="icon" type="image/png" href="assets/logo_cumeats.png">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/main.js" defer></script>
    <script src="js/search.js" defer></script>
</head>

<body class="site-wrapper">

    <div id="header-placeholder"></div>

    <main class="listado-main">
        <div class="container">

            <section class="search-section">
                <form action="listado.html" method="GET" class="search-bar">
                    <span class="search-icon">📍</span>
                    <input type="text" id="addressSearch" name="direccion" placeholder="Cambiar dirección de entrega..."
                        class="search-input">
                    <button type="submit" class="btn btn-primary">Buscar</button>
                </form>
            </section>

            <div class="layout-grid-sidebar">

                <aside class="filters-sidebar">
                    <h2 class="sidebar-title">Filtrar por</h2>

                    <div class="filter-group">
                        <h3 class="filter-subtitle">Tipos de cocina</h3>
                        <ul class="filter-list">
                            <li><label><input type="checkbox" name="cat" value="cafe"> Cafés y Desayunos</label></li>
                            <li><label><input type="checkbox" name="cat" value="bocadillos"> Bocadillos</label></li>
                            <li><label><input type="checkbox" name="cat" value="pizza"> Pizzas</label></li>
                            <li><label><input type="checkbox" name="cat" value="menu"> Menú del día</label></li>
                            <li><label><input type="checkbox" name="cat" value="italiana"> Italiana</label></li>
                        </ul>
                    </div>

                    <div class="filter-group">
                        <h3 class="filter-subtitle">Ordenar por</h3>
                        <select class="form-control">
                            <option>Relevancia</option>
                            <option>Puntuación</option>
                            <option>Tiempo de entrega</option>
                        </select>
                    </div>
                </aside>

                <section class="results-section">

                    <div id="search-results-container">
                        <h2 class="section-title" id="search-title">Resultados de búsqueda</h2>
                        <div class="restaurant-list" id="search-list">
                        </div>
                    </div>

                    <hr class="section-divider">
                    <div id="all-restaurants-container">
                        <h2 class="section-title">Todos los establecimientos</h2>
                        <div class="restaurant-list" id="all-list">
                        </div>
                    </div>

                </section>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

</body>

</html>
